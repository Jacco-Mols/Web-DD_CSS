<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header></header>
    <main>
            <!-- power on/off -->
            <input type="checkbox" name="power">
            <label for="power">Off / On</label>

            <!-- gameboy -->
            <article>
                <!-- screen -->
                <section>
                    <section>
                        <h2>Press Start</h2>

                        <div></div>
                    </section>
                </section>

                <!-- controls -->
                <section>

                    <!-- up right down left -->
                    <div>
                        <!-- can change it to button with an :active state
                        and change animation to pause and running, works with single animation but also infinite -->
                        <input type="radio" name="move"></input>
                        <input type="radio" name="move"></input>
                        <input type="radio" name="move"></input>
                        <input type="radio" name="move"></input>
                    </div>
                    <!-- A and B -->
                    <div>
                        <ul>
                            <li>
                                <button></button>
                                <p>A</p>
                            </li>
                            <li>
                                <button></button>
                                <p>B</p>
                            </li>
                        </ul>
                    </div>

                    <!-- Select & Start -->
                    <div>
                        <button></button>
                        <p>Select</p>
                        <input type="checkbox"></input>
                        <p>Start</p>
                    </div>
                </section>
            </article>
    </main>
    <footer></footer>
</body>
</html>
